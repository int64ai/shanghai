<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>상하이 여행 지도</title>
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { font-family: 'Pretendard', -apple-system, BlinkMacSystemFont, sans-serif; background: #0a0a0a; color: #e0e0e0; }
  #map { width: 100%; height: 100vh; }
  
  .custom-popup .leaflet-popup-content-wrapper {
    background: #1a1a2e;
    color: #e0e0e0;
    border: 1px solid #333;
    border-radius: 8px;
    box-shadow: 0 4px 20px rgba(0,0,0,0.5);
  }
  .custom-popup .leaflet-popup-tip { background: #1a1a2e; }
  .custom-popup .leaflet-popup-content { margin: 12px 16px; font-size: 14px; line-height: 1.6; }
  .popup-title { font-size: 16px; font-weight: 700; margin-bottom: 4px; }
  .popup-subtitle { font-size: 12px; color: #888; margin-bottom: 6px; }
  .popup-desc { font-size: 13px; color: #aaa; }
  .popup-distance { font-size: 12px; color: #64b5f6; margin-top: 4px; }

  .legend {
    position: fixed;
    bottom: 24px;
    left: 50%;
    transform: translateX(-50%);
    background: rgba(26, 26, 46, 0.95);
    backdrop-filter: blur(10px);
    border: 1px solid #333;
    border-radius: 12px;
    padding: 12px 20px;
    z-index: 1000;
    display: flex;
    gap: 16px;
    flex-wrap: wrap;
    justify-content: center;
    max-width: 90vw;
  }
  .legend-item {
    display: flex;
    align-items: center;
    gap: 6px;
    font-size: 13px;
    white-space: nowrap;
  }
  .legend-dot {
    width: 10px;
    height: 10px;
    border-radius: 50%;
    flex-shrink: 0;
  }

  .title-bar {
    position: fixed;
    top: 0;
    left: 0;
    right: 0;
    background: rgba(26, 26, 46, 0.9);
    backdrop-filter: blur(10px);
    border-bottom: 1px solid #333;
    padding: 12px 20px;
    z-index: 1000;
    text-align: center;
  }
  .title-bar h1 { font-size: 18px; font-weight: 700; letter-spacing: 1px; }
  .title-bar p { font-size: 12px; color: #888; margin-top: 2px; }
</style>
</head>
<body>

<div class="title-bar">
  <h1>上海 4泊5日</h1>
  <p>상하이 여행 지도 — 숙소 & 주요 목적지</p>
</div>

<div id="map"></div>

<div class="legend">
  <div class="legend-item"><div class="legend-dot" style="background:#ff6b6b"></div>숙소</div>
  <div class="legend-item"><div class="legend-dot" style="background:#ffd93d"></div>관광지</div>
  <div class="legend-item"><div class="legend-dot" style="background:#64b5f6"></div>이차원</div>
</div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script>
const locations = [
  {
    name: "Grand Central Hotel Shanghai",
    nameCn: "上海大酒店",
    nameKo: "그랜드 센트럴 호텔",
    lat: 31.2362,
    lng: 121.4755,
    type: "hotel",
    color: "#ff6b6b",
    desc: "숙소. 九江路(주장루) 505号, 南京东路 보행가 바로 옆.",
    distance: ""
  },
  {
    name: "Nanjing Road Pedestrian Street",
    nameCn: "南京东路步行街",
    nameKo: "난징동루 보행가",
    lat: 31.23575,
    lng: 121.47972,
    type: "sight",
    color: "#ffd93d",
    desc: "상하이 대표 보행자 거리. 숙소에서 도보 5분.",
    distance: "숙소에서 ~400m"
  },
  {
    name: "The Bund",
    nameCn: "外滩",
    nameKo: "와이탄",
    lat: 31.2403,
    lng: 121.4906,
    type: "sight",
    color: "#ffd93d",
    desc: "浦东(푸동) 스카이라인 야경 명소. 밤에 갈 것.",
    distance: "숙소에서 ~1.5km"
  },
  {
    name: "Xintiandi",
    nameCn: "新天地",
    nameKo: "신천지",
    lat: 31.2195,
    lng: 121.4728,
    type: "sight",
    color: "#ffd93d",
    desc: "石库门(스쿠먼) 건축 보존 지구. 카페, 바, 레스토랑 밀집.",
    distance: "숙소에서 ~2km"
  },
  {
    name: "Yu Garden",
    nameCn: "豫园",
    nameKo: "예원",
    lat: 31.2272,
    lng: 121.4921,
    type: "sight",
    color: "#ffd93d",
    desc: "명대 정원. 城隍庙(청황묘) 먹거리 골목 포함.",
    distance: "숙소에서 ~2km"
  },
  {
    name: "Bailian ZX",
    nameCn: "百联ZX创趣场",
    nameKo: "바이리엔ZX",
    lat: 31.2370,
    lng: 121.4790,
    type: "otaku",
    color: "#64b5f6",
    desc: "6층 이차원 전문 상가. animate, ANIPLEX, 万代魂 등 50+ 브랜드. 상하이의 아키하바라.",
    distance: "숙소에서 ~300m"
  },
  {
    name: "Jing'an Temple",
    nameCn: "静安寺",
    nameKo: "정안사",
    lat: 31.2236,
    lng: 121.4468,
    type: "sight",
    color: "#ffd93d",
    desc: "천년 역사 불교 사찰. 시내 한복판의 화려한 금색 건축. 입장료 50위안(~1만원), 약 1시간 소요.",
    distance: "숙소에서 ~3km (지하철 2호선 직통)"
  }
];

// Dark tile layer
const map = L.map('map', {
  zoomControl: false
}).setView([31.2320, 121.4820], 15);

L.control.zoom({ position: 'topright' }).addTo(map);

L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png', {
  attribution: '&copy; <a href="https://www.openstreetmap.org/copyright">OSM</a> &copy; <a href="https://carto.com/">CARTO</a>',
  subdomains: 'abcd',
  maxZoom: 19
}).addTo(map);

// Custom circle markers
locations.forEach(loc => {
  const radius = loc.type === 'hotel' ? 12 : 9;
  const marker = L.circleMarker([loc.lat, loc.lng], {
    radius: radius,
    fillColor: loc.color,
    color: '#fff',
    weight: 2,
    opacity: 0.9,
    fillOpacity: 0.85
  }).addTo(map);

  const popup = `
    <div class="popup-title">${loc.nameKo}</div>
    <div class="popup-subtitle">${loc.nameCn} · ${loc.name}</div>
    <div class="popup-desc">${loc.desc}</div>
    ${loc.distance ? `<div class="popup-distance">${loc.distance}</div>` : ''}
  `;
  marker.bindPopup(popup, { className: 'custom-popup', maxWidth: 280 });

  // Label
  const label = L.divIcon({
    className: 'marker-label',
    html: `<span style="
      color: ${loc.color};
      font-size: 12px;
      font-weight: 600;
      text-shadow: 0 0 4px rgba(0,0,0,0.8), 0 0 8px rgba(0,0,0,0.6);
      white-space: nowrap;
    ">${loc.nameKo}</span>`,
    iconSize: [0, 0],
    iconAnchor: [-14, 4]
  });
  L.marker([loc.lat, loc.lng], { icon: label, interactive: false }).addTo(map);
});

// Fit bounds with padding
const bounds = L.latLngBounds(locations.map(l => [l.lat, l.lng]));
map.fitBounds(bounds, { padding: [80, 60] });
</script>
</body>
</html>
